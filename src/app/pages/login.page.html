<ion-header>
  <ion-toolbar>
    <ion-title>Login Supabase</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-content>

      <ion-item>
        <ion-label position="floating">Correo</ion-label>
        <ion-input
          type="email"
          [(ngModel)]="email">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="password">
        </ion-input>
      </ion-item>

      <ion-button expand="block" class="ion-margin-top" (click)="login()">
        Iniciar sesión
      </ion-button>

      <ion-button expand="block" fill="outline" (click)="register()">
        Registrarse
      </ion-button>

      <ion-text color="danger" *ngIf="mensaje">
        <p>{{ mensaje }}</p>
      </ion-text>

    </ion-card-content>
  </ion-card>

</ion-content>
